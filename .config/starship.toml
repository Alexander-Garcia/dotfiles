palette = 'catppuccin_mocha'

[fill]
symbol="-"

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "َ°•ˆ"
SUSE = ""
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = ""
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "َ°£‡"
Artix = "َ°£‡"
CentOS = ""
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = " "
"Music" = "َ°‌ڑ "
"Pictures" = " "
"Developer" = "َ°²‹ "

[git_branch]
symbol = ""
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
ahead = 'â‡،${count}'
diverged = 'â‡•â‡،${ahead_count}â‡£${behind_count}'
behind = 'â‡£${count}'
untracked = '?${count} '
modified = '!${count} '
deleted = 'âœک${count}'
staged = '+${count} '
style = 'bg:green'
format = '[[ $untracked$modified$staged$deleted ](fg:crust bg:green)]($style)'

[nodejs]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version)(\($virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'


[character]
disabled = false
success_symbol = '[ َ±‍© ](bold fg:green)'
error_symbol = '[ âœک ](bold fg:red)'

[cmd_duration]
show_milliseconds = false
style="bg: green"
format = "[$duration](fg:crust bg:green)"
disabled = false
show_notifications = true
min_time_to_notify = 45000

